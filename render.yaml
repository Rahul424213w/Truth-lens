services:
  - type: web
    name: truthlens-backend
    env: node
    rootDir: backend
    buildCommand: rm -rf node_modules package-lock.json && npm install && npm rebuild mime-db
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18.20.4