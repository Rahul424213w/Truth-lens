services:
  - type: web
    name: truthlens-backend
    env: node
    rootDir: backend
    buildCommand: rm -f db.json && rm -rf node_modules package-lock.json && npm install && node -e "require('express')" && echo "✅ express OK"
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18.20.4